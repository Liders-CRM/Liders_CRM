<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="1000" height="480">

  <!-- Background -->
  <rect width="500" height="240" fill="#0F1F3D" rx="16"/>

  <!-- Gold arcs - centered above text -->
  <path d="M 148 128 A 102 102 0 0 1 352 128"
        fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
  <path d="M 168 128 A 82 82 0 0 1 332 128"
        fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Blue arrow line from left arrowhead to base of L -->
  <!-- Arrow line -->
  <line x1="32" y1="166" x2="130" y2="166" stroke="#2563EB" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Arrowhead pointing LEFT -->
  <polygon points="18,166 34,158 34,174" fill="#2563EB"/>

  <!-- LIDERS text — L starts at ~x=130 -->
  <text
    x="250" y="166"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="68"
    fill="white"
    text-anchor="middle"
    letter-spacing="2"
  >LIDERS</text>

  <!-- Tagline -->
  <text
    x="250" y="204"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="13"
    fill="#8FB3D9"
    text-anchor="middle"
    letter-spacing="6"
  >LEAD · CLOSE · WIN</text>

</svg>
