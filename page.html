<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>הזמנה, PLTO</title>
  <meta name="description" content="הזמנה אישית מבעל מקצוע ב-PLTO">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://scyfywvzoogfrlalgftv.supabase.co; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Supabase (same version as index.html/sign.html) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js"
          integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p"
          crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0F1F3D;
      --navy-600:  #1a3460;
      --blue:      #2563EB;
      --blue-700:  #1d4ed8;
      --gray-50:   #f8fafc;
      --gray-100:  #f1f5f9;
      --gray-200:  #e2e8f0;
      --gray-400:  #94a3b8;
      --gray-500:  #64748b;
      --gray-700:  #334155;
      --gray-900:  #0f172a;
      --white:     #ffffff;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,0.08);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Heebo', sans-serif;
      background: #f0f4ff;
      color: var(--gray-900);
      direction: rtl;
    }

    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 520px;
    }

    .page-header {
      background: var(--navy);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 24px 20px;
      text-align: center;
    }
    .page-logo {
      font-size: 22px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.5px;
    }
    .page-sub {
      font-size: 12.5px;
      color: rgba(255,255,255,0.6);
      margin-top: 3px;
    }

    .card-body { padding: 28px 24px; }

    #state-loading, #state-ready, #state-unavailable { display: none; }
    #state-loading.active, #state-ready.active, #state-unavailable.active { display: block; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pg-headline {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1.4;
      margin-bottom: 14px;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .pg-body {
      font-size: 15px;
      color: var(--gray-700);
      line-height: 1.75;
      white-space: pre-wrap;
      margin-bottom: 24px;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .btn-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-cta:hover { background: var(--blue-700); }

    .unavail-icon { font-size: 44px; text-align: center; margin-bottom: 10px; }
    .unavail-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--gray-700);
      text-align: center;
      margin-bottom: 6px;
    }
    .unavail-msg {
      font-size: 13px;
      color: var(--gray-500);
      text-align: center;
      line-height: 1.6;
    }

    .page-footer {
      margin-top: 24px;
      font-size: 11.5px;
      color: var(--gray-400);
      text-align: center;
      line-height: 1.6;
    }
    .page-footer a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="card">
    <div class="page-header">
      <div class="page-logo">PLTO</div>
      <div class="page-sub" id="hdr-title">הזמנה אישית</div>
    </div>

    <div class="card-body">

      <!-- ── Loading ── -->
      <div id="state-loading">
        <div class="spinner"></div>
      </div>

      <!-- ── Ready: AI-generated structured copy, rendered via textContent only ── -->
      <div id="state-ready">
        <div class="pg-headline" id="rdy-headline"></div>
        <div class="pg-body" id="rdy-body"></div>
        <a class="btn-cta" id="rdy-cta" href="#" rel="noopener">
          <span id="rdy-cta-label">הצטרפות</span>
        </a>
      </div>

      <!-- ── Unavailable: identical for "not found" and "tenant inactive" — never distinguish ── -->
      <div id="state-unavailable">
        <div class="unavail-icon">🔗</div>
        <div class="unavail-title">העמוד אינו זמין</div>
        <div class="unavail-msg">
          ייתכן שהקישור שגוי או שהעמוד כבר אינו פעיל.<br>
          כדאי לבקש קישור מעודכן ממי ששלח אותו.
        </div>
        <div style="text-align:center;margin-top:20px;">
          <a href="https://plto.app/" style="color:var(--blue);font-size:13px;">לאתר PLTO</a>
        </div>
      </div>

    </div><!-- /card-body -->
  </div><!-- /card -->

  <div class="page-footer">
    נוצר ע"י <a href="https://plto.app/">PLTO</a><br>
    פלטפורמה לניהול לידים ועסקאות לאנשי מקצוע
  </div>
</div>

<script>
'use strict';

const SUPABASE_URL = 'https://scyfywvzoogfrlalgftv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjeWZ5d3Z6b29nZnJsYWxnZnR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDA3MzAsImV4cCI6MjA5NjA3NjczMH0._D8ho0Yj8fEk7nd6-vmkjKkKyjfvHDmSq9Y8h5XzQCM';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const Page = {
  show(id) {
    ['state-loading', 'state-ready', 'state-unavailable'].forEach(s => {
      document.getElementById(s).classList.toggle('active', s === id);
    });
  },

  async init() {
    this.show('state-loading');
    const params = new URLSearchParams(location.search);
    const slug   = params.get('p') || '';

    if (!slug || !/^[a-f0-9]{16}$/.test(slug)) {
      this.show('state-unavailable');
      return;
    }

    try {
      const { data, error } = await sbClient.rpc('get_public_page', { p_slug: slug });
      if (error || !data?.available) {
        // Deliberately the SAME state for "not found" and "tenant inactive" —
        // get_public_page() never tells us which, and the UI must not either.
        this.show('state-unavailable');
        return;
      }

      // AI-generated content only ever lands in textContent — never innerHTML —
      // so it can't inject markup regardless of what the model produced.
      if (data.title) document.getElementById('hdr-title').textContent = data.title;
      document.getElementById('rdy-headline').textContent = data.headline || '';
      document.getElementById('rdy-body').textContent = data.body_text || '';
      document.getElementById('rdy-cta-label').textContent = data.cta_label || 'הצטרפות';

      const ctaUrl = data.cta_url || '';
      if (/^https:\/\//.test(ctaUrl)) {
        document.getElementById('rdy-cta').href = ctaUrl;
      } else {
        document.getElementById('rdy-cta').style.display = 'none';
      }

      this.show('state-ready');
    } catch (e) {
      this.show('state-unavailable');
    }
  }
};

document.addEventListener('DOMContentLoaded', () => Page.init());
</script>
</body>
</html>
